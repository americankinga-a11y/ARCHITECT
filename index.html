<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ARCHITECT PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #0b0e11; --green: #00c853; --red: #ff3d00; --panel: #151921; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: white; font-family: 'Roboto', sans-serif; overflow: hidden; }

        /* हेडर - जहाँ LIVE ACCOUNT Green होगा */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: var(--panel); height: 60px; border-bottom: 1px solid #2a2e39; }
        .bal-box { background: #1e222d; padding: 5px 15px; border-radius: 6px; border: 1px solid #363c4e; text-align: center; }
        .live-tag { font-size: 10px; color: var(--green); font-weight: 900; letter-spacing: 1px; display: block; text-shadow: 0 0 5px var(--green); }
        .bal-val { font-weight: 900; color: white; font-size: 18px; }

        /* मार्केट मोड सेलेक्टर */
        .market-nav { position: absolute; top: 70px; left: 15px; z-index: 100; display: flex; gap: 8px; }
        .m-btn { background: #1e222d; border: 1px solid #363c4e; color: #707a8a; padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .m-btn.active { border-color: var(--gold); color: var(--gold); }

        #chart-container { width: 100%; height: calc(100vh - 220px); background: var(--bg); }

        /* प्रोफेशनल ट्रेड पैनल */
        .trade-controls { position: fixed; bottom: 0; width: 100%; background: var(--panel); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid #2a2e39; box-sizing: border-box; border-radius: 20px 20px 0 0; }
        .input-group { background: #1e222d; border-radius: 10px; padding: 10px; border: 1px solid #363c4e; }
        .input-label { font-size: 10px; color: #707a8a; display: block; margin-bottom: 4px; }
        .input-val { font-size: 16px; font-weight: bold; color: white; }

        .btn-trade { height: 70px; border: none; border-radius: 12px; font-size: 35px; font-weight: 900; cursor: pointer; transition: 0.1s; }
        .btn-trade:active { transform: scale(0.92); }
        .up { background: var(--green); color: #0b0e11; }
        .down { background: var(--red); color: white; }

        /* मॉडल्स */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-card { background: var(--panel); border: 1px solid var(--gold); padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 900; color: var(--gold); font-size: 24px;">A</div>
    <div class="bal-box">
        <span class="live-tag">● LIVE ACCOUNT</span>
        <span id="acc-bal" class="bal-val">₹10,480.00</span>
    </div>
    <button onclick="openModal('dep-modal')" style="background:var(--green); border:none; padding:8px 15px; border-radius:5px; font-weight:bold; font-size:12px;">DEPOSIT</button>
</div>

<div class="market-nav">
    <button class="m-btn active" id="btn-real" onclick="switchMarket('REAL')">REAL MARKET</button>
    <button class="m-btn" id="btn-otc" onclick="switchMarket('OTC')">OTC MARKET</button>
</div>

<div id="chart-container"></div>

<div class="trade-controls">
    <div class="input-group">
        <span class="input-label">INVESTMENT</span>
        <span class="input-val">₹1,000</span>
    </div>
    <div class="input-group">
        <span class="input-label">PAYOUT</span>
        <span class="input-val" style="color:var(--green)">+88%</span>
    </div>
    <button class="btn-trade up" onclick="handleTrade('UP')">↑</button>
    <button class="btn-trade down" onclick="handleTrade('DOWN')">↓</button>
</div>

<div id="dep-modal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--gold)">FAST DEPOSIT</h3>
        <img src="https://i.ibb.co/6RTPv4n/1000006606.png" style="width:100%; border-radius:10px; margin-bottom:15px; background:white;">
        <p style="font-size:12px; color:#707a8a;">UPI ID: 7251072316@ptaxis</p>
        <button onclick="closeModals()" style="background:var(--gold); border:none; width:100%; padding:12px; border-radius:8px; font-weight:bold;">I HAVE PAID</button>
    </div>
</div>

<script>
    let balance = 10480.00;
    let marketType = 'REAL';
    let currentPrice = 65000;

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    // --- CHART ENGINE ---
    const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
        layout: { backgroundColor: '#0b0e11', textColor: '#707a8a' },
        grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
        priceScale: { borderColor: '#2a2e39' },
        timeScale: { borderColor: '#2a2e39', timeVisible: true, secondsVisible: true }
    });
    const candleSeries = chart.addCandlestickSeries({
        upColor: '#00c853', downColor: '#ff3d00', borderVisible: false, wickUpColor: '#00c853', wickDownColor: '#ff3d00'
    });

    // Market Switching Logic
    function switchMarket(type) {
        marketType = type;
        document.getElementById('btn-real').classList.toggle('active', type === 'REAL');
        document.getElementById('btn-otc').classList.toggle('active', type === 'OTC');
        alert(type + " Market Loaded Successfully");
    }

    // Live Feed (Binance + OTC Simulation)
    const socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_1m');
    socket.onmessage = (e) => {
        if(marketType === 'REAL') {
            const k = JSON.parse(e.data).k;
            currentPrice = parseFloat(k.c);
            candleSeries.update({ time: k.t/1000, open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: currentPrice });
        }
    };

    setInterval(() => {
        if(marketType === 'OTC') {
            let change = (Math.random() - 0.5) * 10;
            let lastPrice = currentPrice;
            currentPrice += change;
            candleSeries.update({ time: Math.floor(Date.now()/1000), open: lastPrice, high: Math.max(lastPrice, currentPrice)+2, low: Math.min(lastPrice, currentPrice)-2, close: currentPrice });
        }
    }, 1000);

    // REAL BALANCE LOGIC
    function handleTrade(dir) {
        if(balance < 1000) return alert("Insufficient Balance!");
        
        balance -= 1000; // पैसा कट गया
        updateUI();

        setTimeout(() => {
            // Winning Probability (Architect Algorithm)
            let win = Math.random() > 0.7; 
            if(win) {
                balance += 1880; // पैसा बढ़ गया (Win)
                alert("TRADE WON! ₹1,880 added to Live Account.");
            } else {
                alert("TRADE LOST! Better luck next time.");
            }
            updateUI();
        }, 3000);
    }

    function updateUI() {
        document.getElementById('acc-bal').innerText = "₹" + balance.toLocaleString('en-IN', {minimumFractionDigits: 2});
    }
</script>
</body>
</html>
