<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ARCHITECT</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --gold: #d4af37; --bg: #05070a; --green: #00e676; --red: #ff1744; --panel: #0e1116; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; user-select: none; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: var(--panel); border-bottom: 1px solid #222; height: 60px; z-index: 1000; position: relative; }
        .logo-box { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        #main-logo { height: 35px; border: 1.5px solid var(--gold); border-radius: 5px; }
        .acc-info { border-left: 2px solid var(--gold); padding: 2px 10px; }

        /* CHART AREA */
        #chart-zone { height: calc(100vh - 220px); width: 100%; position: absolute; top: 60px; background: #05070a; overflow: hidden; }
        canvas { width: 100%; height: 100%; }

        /* TRADE LINE (QUOTEX STYLE) */
        .trade-marker { position: absolute; left: 0; width: 100%; z-index: 100; pointer-events: none; }
        .trade-label { position: absolute; right: 10px; top: -10px; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        /* CONTROLS */
        .trade-pad { position: fixed; bottom: 0; width: 100%; background: var(--panel); padding: 12px 15px 25px; border-top: 1px solid #333; z-index: 1000; box-sizing: border-box; }
        .grid-inputs { display: flex; gap: 8px; margin-bottom: 10px; }
        .box { flex: 1; background: #000; border-radius: 8px; border: 1px solid #222; padding: 8px; text-align: center; }
        .box span { font-size: 9px; color: #666; display: block; text-transform: uppercase; }
        .box b { font-size: 14px; color: #fff; }

        .btn-row { display: flex; gap: 12px; }
        .m-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 26px; font-weight: 900; cursor: pointer; transition: 0.1s; }
        .m-btn:active { transform: scale(0.95); }
        .up { background: var(--green); color: #000; box-shadow: 0 4px 0 #008a46; }
        .down { background: var(--red); color: #fff; box-shadow: 0 4px 0 #a3002b; }

        /* SIDE MENU & MODALS */
        .side-menu { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: var(--panel); z-index: 2000; transition: 0.4s; border-right: 1px solid var(--gold); padding: 20px; box-sizing: border-box; }
        .menu-item { padding: 15px; border-bottom: 1px solid #222; color: #ccc; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .card { background: var(--panel); border: 2px solid var(--gold); padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
        .input-arc { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 12px; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-box" onclick="toggleMenu(true)">
        <img src="logo.png" id="main-logo" alt="L" onerror="this.src='https://via.placeholder.com/35/d4af37/000?text=A'">
        <div class="acc-info">
            <div id="acc-type" style="font-size: 8px; color: var(--gold); font-weight: bold;">DEMO ACCOUNT</div>
            <div id="acc-bal" style="font-size: 16px; font-weight: 900;">₹10,000.00</div>
        </div>
    </div>
    <button onclick="showVIP()" style="background:var(--gold); border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer; font-size:11px;">VIP PACKS</button>
</div>

<div id="chart-zone">
    <canvas id="candleCanvas"></canvas>
    <div id="trade-layer"></div> </div>

<div class="trade-pad">
    <div class="grid-inputs">
        <div class="box"><span>Investment</span><b>₹1,000</b></div>
        <div class="box"><span>Payout</span><b style="color:var(--green)">85%</b></div>
        <div class="box"><span>Time</span><b>1:00 MIN</b></div>
    </div>
    <div class="btn-row">
        <button class="m-btn up" onclick="startTrade('UP')">↑</button>
        <button class="m-btn down" onclick="startTrade('DOWN')">↓</button>
    </div>
</div>

<div id="side-pnl" class="side-menu">
    <h2 style="color:var(--gold)">THE ARCHITECT</h2>
    <div class="menu-item" onclick="showKYC()">🆔 KYC (Aadhaar Verify)</div>
    <div class="menu-item">👥 Refer & Earn (MLM)</div>
    <div class="menu-item">🏆 Tournaments</div>
    <div class="menu-item" onclick="toggleMenu(false)">⬅ Close Menu</div>
</div>

<div id="vip-modal" class="modal">
    <div class="card">
        <h3 style="color:var(--gold)">MEMBERSHIP PLANS</h3>
        <p style="font-size:12px; color:#888;">हमेसा प्रॉफिट में रहने के लिए जॉइन करें</p>
        <div style="background:#1a1d23; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #333;">
            <b>VIP SILVER - ₹299/Mo</b>
        </div>
        <div style="background:#1a1d23; padding:12px; margin-bottom:20px; border-radius:10px; border:2px solid var(--gold);">
            <b>VIP GOLD - ₹999/Mo</b>
        </div>
        <button onclick="alert('Payment Gateway Connecting...')" style="width:100%; background:var(--green); border:none; padding:15px; border-radius:10px; font-weight:bold;">BUY NOW</button>
        <p onclick="document.getElementById('vip-modal').style.display='none'" style="margin-top:15px; font-size:12px; color:#555;">Close</p>
    </div>
</div>

<script>
    let balance = 10000;
    let winStreak = 0;
    let activeTrades = [];
    const canvas = document.getElementById('candleCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    function toggleMenu(s) { document.getElementById('side-pnl').style.left = s ? '0' : '-100%'; }
    function showVIP() { document.getElementById('vip-modal').style.display = 'flex'; }
    function showKYC() { alert("आधार कार्ड अपलोड करें (Coming Soon)"); }

    // --- ARCHITECT SMART ALGORITHM ---
    function startTrade(dir) {
        if(balance < 1000) { alert("Insufficient Fund!"); return; }
        
        balance -= 1000;
        updateUI();

        // Quotex Style Visual Line
        let entryY = currentPriceY; 
        let tradeId = Date.now();
        let tradeColor = (dir === 'UP') ? 'var(--green)' : 'var(--red)';

        let marker = document.createElement('div');
        marker.id = `trade-${tradeId}`;
        marker.className = 'trade-marker';
        marker.style.top = entryY + "px";
        marker.style.borderTop = `2px dashed ${tradeColor}`;
        marker.innerHTML = `<div class="trade-label" style="background:${tradeColor}">${dir} ₹1,000</div>`;
        document.getElementById('trade-layer').appendChild(marker);

        // Algorithm Logic: House Always Wins
        setTimeout(() => {
            let win = true;
            // अगर यूजर 2 बार जीत चुका है या रैंडम 60% चांस है, तो उसे हराओ (Point-Loss Mode)
            if(winStreak >= 2 || Math.random() < 0.6) {
                win = false;
            }

            if(win) {
                balance += 1850;
                winStreak++;
                alert("TRADE WIN! ₹1,850 credited.");
            } else {
                winStreak = 0;
                alert("TRADE LOST! Market manipulated by Architect.");
            }

            document.getElementById(`trade-${tradeId}`).remove();
            updateUI();
        }, 4000); // 4 सेकंड की ट्रेड (टेस्टिंग के लिए)
    }

    function updateUI() {
        document.getElementById('acc-bal').innerText = "₹" + balance.toLocaleString() + ".00";
    }

    // --- CANDLESTICK ENGINE ---
    let candles = [];
    let currentPriceY = 300;

    function createCandle() {
        let lastClose = candles.length > 0 ? candles[candles.length-1].close : 300;
        let open = lastClose;
        let close = open + (Math.random() * 60 - 30);
        let high = Math.max(open, close) + Math.random() * 10;
        let low = Math.min(open, close) - Math.random() * 10;
        
        candles.push({open, close, high, low});
        currentPriceY = 500 - close; // ट्रैक करने के लिए
        if(candles.length > 15) candles.shift();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let w = canvas.width / 15;
        
        // Grid Lines
        ctx.strokeStyle = "#111";
        for(let i=0; i<canvas.height; i+=50) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        candles.forEach((c, i) => {
            let x = i * w + 20;
            let color = c.close > c.open ? '#00e676' : '#ff1744';
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 2;

            // Wick
            ctx.beginPath(); 
            ctx.moveTo(x + w/3, 500 - c.high); 
            ctx.lineTo(x + w/3, 500 - c.low); 
            ctx.stroke();

            // Body
            ctx.fillRect(x + 5, 500 - Math.max(c.open, c.close), w/1.5, Math.abs(c.open - c.close) + 1);
        });
        requestAnimationFrame(draw);
    }

    setInterval(createCandle, 2000);
    draw();
</script>
</body>
</html>
