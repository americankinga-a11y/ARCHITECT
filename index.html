<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ARCHITECT</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json;base64,ewogICAgIm5hbWUiOiAiVEhFIEFSQ0hJVEVDVCIsCiAgICAic2hvcnRfbmFtZSI6ICJBcmNoaXRlY3QiLAogICAgInN0YXJ0X3VybCI6ICIuIiwKICAgICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICAgImJhY2tncm91bmRfY29sb3IiOiAiIzA1MDcwYSIsCiAgICAidGhlbWVfY29sb3IiOiAiIzA1MDcwYSIKfQ==">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #05070a; --green: #00e676; --red: #ff1744; --panel: #0e1116; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }

        /* हेडर और लोगो */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--panel); border-bottom: 1px solid #1a1a1a; height: 60px; position: fixed; top: 0; width: 100%; z-index: 100; box-sizing: border-box; }
        .logo-box { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        #main-logo { height: 35px; } /* GOLD LOGO SIZE */
        .acc-info { border-left: 2px solid var(--gold); padding-left: 10px; }

        /* हेडर बटन्स */
        .head-btns { display: flex; gap: 8px; }
        .h-btn { border: none; padding: 7px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; font-family: 'Inter'; transition: 0.1s; }
        .h-btn:active { transform: scale(0.95); }
        .vip-btn { background: var(--gold); color: #000; }
        .dep-btn { background: #1a1d23; color: var(--green); border: 1px solid var(--green); }

        /* चार्ट */
        #chart-container { width: 100%; height: calc(100vh - 230px); margin-top: 60px; background: var(--bg); position: relative; }

        /* ट्रेड कंट्रोल्स */
        .trade-pad { position: fixed; bottom: 0; width: 100%; background: var(--panel); padding: 15px; border-top: 1px solid #222; z-index: 100; box-sizing: border-box; border-radius: 20px 20px 0 0; }
        .grid-inputs { display: flex; gap: 10px; margin-bottom: 15px; }
        .box { flex: 1; background: #000; border-radius: 10px; border: 1px solid #222; padding: 10px; text-align: center; }
        .box span { font-size: 10px; color: #777; display: block; margin-bottom: 3px; }
        .box b { font-size: 15px; }

        .btn-row { display: flex; gap: 15px; }
        .m-btn { flex: 1; padding: 18px; border: none; border-radius: 12px; font-size: 30px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .m-btn:active { transform: scale(0.92); }
        .up { background: var(--green); color: #000; }
        .down { background: var(--red); color: #fff; }

        /* पॉप-अप (MODAL) स्टाइल */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; opacity: 0; transition: opacity 0.3s ease; }
        .modal.open { display: flex; opacity: 1; }
        .card { background: var(--panel); border: 1px solid #333; padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; box-sizing: border-box; position: relative; }
        .card h3 { color: var(--gold); margin-top: 0; }
        .card .close-icon { position: absolute; top: 15px; right: 20px; font-size: 20px; color: #555; cursor: pointer; }

        /* फास्ट डिपॉजिट (PAYTM QR) स्टाइल */
        #qr-image { width: 100%; max-width: 250px; border-radius: 15px; border: 4px solid var(--gold); padding: 5px; background: white; margin: 15px 0; }
        .upi-label { background: #1a1d23; color: var(--gold); padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .f-dep-btn { width: 100%; background: var(--green); border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-box">
        <img src="https://i.ibb.co/Xz95p6F/logo.png" id="main-logo" alt="ARCHITECT">
        <div class="acc-info">
            <div style="font-size: 8px; color: var(--gold); font-weight: 900;">LIVE ACCOUNT</div>
            <div id="acc-bal" style="font-size: 18px; font-weight: 900;">₹10,000.00</div>
        </div>
    </div>
    <div class="head-btns">
        <button class="h-btn dep-btn" onclick="openDeposit()">+ DEPOSIT</button>
        <button class="h-btn vip-btn" onclick="openVIP()">VIP</button>
    </div>
</div>

<div id="chart-container"></div>

<div class="trade-pad">
    <div class="grid-inputs">
        <div class="box"><span>INVESTMENT</span><b>₹1,000</b></div>
        <div class="box"><span>PAYOUT</span><b style="color:var(--green)">+87%</b></div>
        <div class="box"><span>TIME</span><b>01:00</b></div>
    </div>
    <div class="btn-row">
        <button class="m-btn up" onclick="placeTrade('UP')">↑</button>
        <button class="m-btn down" onclick="placeTrade('DOWN')">↓</button>
    </div>
</div>

<div id="dep-modal" class="modal">
    <div class="card">
        <span class="close-icon" onclick="closeModals()">×</span>
        <h3>FAST DEPOSIT</h3>
        <p style="font-size:12px; color:#888;">स्कैन करें और तुरंत फंड लोड करें</p>
        
        <img src="https://i.ibb.co/3sX8M8H/qr-code.png" id="qr-image" alt="Paytm QR">
        
        <div class="upi-label">UPI ID: 7251072316@ptaxis</div>
        
        <button class="f-dep-btn" onclick="alert('Payment processing... Your funds will arrive instantly after verification.')">I'VE PAID</button>
    </div>
</div>

<div id="vip-modal" class="modal">
    <div class="card">
        <span class="close-icon" onclick="closeModals()">×</span>
        <h3>MEMBERSHIP</h3>
        <div style="background:#1a1d23; padding:15px; margin: 15px 0; border-radius:12px; border:2px solid var(--gold);">
            <div style="color:var(--gold); font-weight:900;">VIP GOLD</div>
            <div style="font-size: 11px; color: #888;">₹999/Mo</div>
        </div>
        <button class="f-dep-btn" onclick="openDeposit()">UPGRADE NOW</button>
    </div>
</div>

<script>
    let balance = 10000;
    
    // पॉप-अप्स को कंट्रोल करने के फंक्शंस
    function openDeposit() { closeModals(); document.getElementById('dep-modal').classList.add('open'); }
    function openVIP() { closeModals(); document.getElementById('vip-modal').classList.add('open'); }
    function closeModals() { 
        document.getElementById('dep-modal').classList.remove('open');
        document.getElementById('vip-modal').classList.remove('open');
    }

    // --- असली TRADINGVIEW चार्ट इंजन ---
    const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
        layout: { backgroundColor: '#05070a', textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#0e1116' }, horzLines: { color: '#0e1116' } },
        priceScale: { borderColor: '#1e222d' },
        timeScale: { borderColor: '#1e222d', timeVisible: true }
    });

    const candleSeries = chart.addCandlestickSeries({
        upColor: '#00e676', downColor: '#ff1744', borderDownColor: '#ff1744',
        borderUpColor: '#00e676', wickDownColor: '#ff1744', wickUpColor: '#00e676',
    });

    // डेटा जनरेशन (फ्री API से)
    let lastPrice = 1.08450;
    let data = [];
    let time = Math.floor(Date.now() / 1000) - 100;

    for(let i=0; i<100; i++) {
        let open = lastPrice;
        let close = open + (Math.random() - 0.5) * 0.0005;
        data.push({ time: time + i, open, high: Math.max(open, close) + 0.0001, low: Math.min(open, close) - 0.0001, close });
        lastPrice = close;
    }
    candleSeries.setData(data);

    setInterval(() => {
        let last = data[data.length - 1];
        let nextTime = last.time + 1;
        let open = last.close;
        let close = open + (Math.random() - 0.5) * 0.0002;
        let newData = { time: nextTime, open, high: Math.max(open, close) + 0.0001, low: Math.min(open, close) - 0.0001, close };
        candleSeries.update(newData);
        data.push(newData);
    }, 1000);

    // ट्रेड लगाने का लॉजिक (अभी डेमो है)
    function placeTrade(dir) {
        if(balance < 1000) return alert("Low Balance!");
        balance -= 1000;
        updateUI();
        
        setTimeout(() => {
            let win = Math.random() > 0.5; // बाद में इसे अपने विनिंग लॉजिक से बदलें
            if(win) {
                balance += 1870;
                alert("PROFIT: +₹870");
            } else {
                alert("LOSS: -₹1,000");
            }
            updateUI();
        }, 3000);
    }

    function updateUI() {
        document.getElementById('acc-bal').innerText = "₹" + balance.toLocaleString();
    }
</script>
</body>
</html>
