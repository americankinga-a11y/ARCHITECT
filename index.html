<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Pro Terminal</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 10px; margin: 0; }
        #chart-container { width: 100%; height: 350px; border: 1px solid #333; margin-top: 10px; }
        #status-box { padding: 15px; border: 1px solid #0f0; background: #050505; border-radius: 5px; margin-top: 10px; }
        .price-display { font-size: 1.8rem; color: #fff; margin: 0; }
        #output { margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .alert-box { border-left: 5px solid; padding: 10px; margin: 5px 0; background: #111; font-weight: bold; }
    </style>
</head>
<body>
    <h2 style="text-align:center; text-shadow: 0 0 10px #0f0;">ARCHITECT REAL-MARKET</h2>
    
    <div id="chart-container"></div>

    <div id="status-box">
        <div id="live-data">
            <p class="price-display">Connecting to Real Market...</p>
            <p id="score-text">Strategy Score: --</p>
        </div>
    </div>

    <div id="output"></div>

    <script type="module">
        // --- 1. CHART SETUP ---
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { backgroundColor: '#000000', textColor: '#00ff00' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
            timeScale: { timeVisible: true, secondsVisible: true },
            priceScale: { borderColor: '#333' }
        });
        const candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff00', downColor: '#ff0000', borderVisible: false, wickVisible: true
        });

        // --- 2. INDICATOR (RSI) ---
        function calcRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                const diff = prices[prices.length - i] - prices[prices.length - i - 1];
                if (diff > 0) gains += diff; else losses -= diff;
            }
            const rs = (gains / period) / (losses / period || 1);
            return Math.round(100 - (100 / (1 + rs)));
        }

        // --- 3. DATA FEED ---
        const priceHistory = [];
        const ws = new WebSocket(`wss://stream.binance.com:9443/ws/btcusdt@kline_1m`);
        
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const k = data.k;
            const candle = {
                time: k.t / 1000,
                open: parseFloat(k.o),
                high: parseFloat(k.h),
                low: parseFloat(k.l),
                close: parseFloat(k.c)
            };

            // Update Real-time Chart
            candleSeries.update(candle);
            
            // Update Dashboard
            const currentPrice = candle.close;
            priceHistory.push(currentPrice);
            if(priceHistory.length > 50) priceHistory.shift();

            const score = calcRSI(priceHistory);
            
            document.querySelector('.price-display').innerText = `BTC: $${currentPrice.toFixed(2)}`;
            const scoreEl = document.getElementById('score-text');
            scoreEl.innerText = `Strategy Score: ${score}`;
            scoreEl.style.color = score > 70 ? '#0f0' : score < 30 ? '#f00' : '#fff';

            // Signal Logic (Optimized for Real Market)
            if (score >= 80) sendAlert("CALL", score, currentPrice);
            if (score <= 20) sendAlert("PUT", score, currentPrice);
        };

        function sendAlert(type, score, price) {
            const output = document.getElementById('output');
            const color = type === 'CALL' ? '#0f0' : '#f00';
            const html = `<div class="alert-box" style="border-color:${color}; color:${color}">
                [${new Date().toLocaleTimeString()}] ${type} SIGNAL | Price: $${price} | Score: ${score}
            </div>`;
            output.insertAdjacentHTML('afterbegin', html);
        }
    </script>
</body>
</html>
