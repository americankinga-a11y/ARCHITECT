<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARCHITECT PRO TERMINAL</title>

  <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    body {
      background: black;
      color: #00ff00;
      font-family: Courier New, monospace;
      margin: 0;
      padding: 15px;
    }

    h2 {
      text-align: center;
      text-shadow: 0 0 10px #00ff00;
    }

    #chart-container {
      width: 100%;
      height: 400px;
      border: 1px solid #222;
      border-radius: 10px;
      margin-top: 15px;
    }

    #status-box {
      margin-top: 15px;
      padding: 15px;
      border: 1px solid #00ff00;
      border-radius: 10px;
      background: #050505;
    }

    .price-display {
      font-size: 1.8rem;
      color: white;
      margin: 0;
    }

    #output {
      margin-top: 15px;
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid #222;
      padding: 10px;
      border-radius: 10px;
      background: #070707;
    }

    .alert-box {
      border-left: 5px solid;
      padding: 10px;
      margin: 8px 0;
      background: #111;
      font-weight: bold;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <h2>ARCHITECT REAL MARKET</h2>

  <div id="chart-container"></div>

  <div id="status-box">
    <p class="price-display" id="price">Loading...</p>
    <p id="score-text">RSI Score: --</p>
    <p id="connection">Status: Connecting...</p>
  </div>

  <div id="output"></div>

  <script>
    const chartContainer = document.getElementById("chart-container");

    const chart = LightweightCharts.createChart(chartContainer, {
      width: chartContainer.clientWidth,
      height: 400,
      layout: {
        background: { color: "#000000" },
        textColor: "#00ff00",
      },
      grid: {
        vertLines: { color: "#111" },
        horzLines: { color: "#111" },
      },
      timeScale: {
        timeVisible: true,
        secondsVisible: false,
      },
    });

    const candleSeries = chart.addCandlestickSeries({
      upColor: "#00ff00",
      downColor: "#ff0000",
      wickUpColor: "#00ff00",
      wickDownColor: "#ff0000",
      borderVisible: false,
    });

    window.addEventListener("resize", () => {
      chart.applyOptions({ width: chartContainer.clientWidth });
    });

    function calcRSI(prices, period = 14) {
      if (prices.length < period + 1) return 50;

      let gains = 0;
      let losses = 0;

      for (let i = prices.length - period; i < prices.length; i++) {
        const diff = prices[i] - prices[i - 1];
        if (diff > 0) gains += diff;
        else losses -= diff;
      }

      const avgGain = gains / period;
      const avgLoss = losses / period || 1;

      const rs = avgGain / avgLoss;
      return Math.round(100 - (100 / (1 + rs)));
    }

    let lastSignal = "";

    function sendAlert(type, score, price) {
      if (lastSignal === type) return;
      lastSignal = type;

      const output = document.getElementById("output");
      const color = type === "CALL" ? "#00ff00" : "#ff0000";

      const html = `
        <div class="alert-box" style="border-color:${color}; color:${color}">
          [${new Date().toLocaleTimeString()}] ${type} SIGNAL <br>
          Price: $${price} <br>
          RSI: ${score}
        </div>
      `;

      output.insertAdjacentHTML("afterbegin", html);
    }

    async function loadHistory() {
      const url = "https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=200";
      const res = await fetch(url);
      const data = await res.json();

      const candles = data.map(d => ({
        time: d[0] / 1000,
        open: parseFloat(d[1]),
        high: parseFloat(d[2]),
        low: parseFloat(d[3]),
        close: parseFloat(d[4]),
      }));

      candleSeries.setData(candles);
    }

    loadHistory();

    const priceHistory = [];

    const ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@kline_1m");

    ws.onopen = () => {
      document.getElementById("connection").innerText = "Status: Connected ✅";
      document.getElementById("connection").style.color = "#00ff00";
    };

    ws.onclose = () => {
      document.getElementById("connection").innerText = "Status: Disconnected ❌";
      document.getElementById("connection").style.color = "#ff0000";
    };

    ws.onerror = () => {
      document.getElementById("connection").innerText = "Status: Error ⚠️";
      document.getElementById("connection").style.color = "yellow";
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      const k = data.k;

      const candle = {
        time: k.t / 1000,
        open: parseFloat(k.o),
        high: parseFloat(k.h),
        low: parseFloat(k.l),
        close: parseFloat(k.c),
      };

      candleSeries.update(candle);

      const price = candle.close;
      priceHistory.push(price);
      if (priceHistory.length > 200) priceHistory.shift();

      const rsi = calcRSI(priceHistory);

      document.getElementById("price").innerText = `BTCUSDT: $${price.toFixed(2)}`;

      const scoreEl = document.getElementById("score-text");
      scoreEl.innerText = `RSI Score: ${rsi}`;
      scoreEl.style.color = rsi > 70 ? "#00ff00" : rsi < 30 ? "#ff0000" : "white";

      if (rsi >= 80) sendAlert("CALL", rsi, price);
      if (rsi <= 20) sendAlert("PUT", rsi, price);
    };
  </script>

</body>
</html>
