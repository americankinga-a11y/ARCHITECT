<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ARCHITECT V19 | INSTANT PAY</title>
    <style>
        :root { --gold: #d4af37; --bg: #05070a; --green: #00e676; --red: #ff1744; --panel: #0e1116; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: white; font-family: 'Roboto', sans-serif; overflow: hidden; user-select: none; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: var(--panel); border-bottom: 1px solid #222; height: 60px; z-index: 100; position: relative; }
        .acc-info { border-left: 3px solid var(--gold); padding: 2px 10px; cursor: pointer; }
        .bal { font-size: 17px; font-weight: 900; }

        /* CHART */
        #chart-zone { height: calc(100vh - 180px); width: 100%; position: absolute; top: 60px; z-index: 10; }

        /* MOBILE CONTROLS (SMALL BUTTONS) */
        .trade-pad { position: fixed; bottom: 0; width: 100%; background: var(--panel); padding: 10px 15px 25px; border-top: 1px solid #222; z-index: 1000; }
        .grid-inputs { display: flex; gap: 10px; margin-bottom: 8px; }
        .box { flex: 1; background: #000; border-radius: 8px; border: 1px solid #333; padding: 6px; text-align: center; font-size: 11px; color: #888; }
        .box b { display: block; color: #fff; font-size: 14px; }

        .btn-row { display: flex; gap: 12px; }
        .m-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 22px; font-weight: 900; cursor: pointer; }
        .up { background: var(--green); color: #000; box-shadow: 0 3px 0 #008a46; }
        .down { background: var(--red); color: #fff; box-shadow: 0 3px 0 #a3002b; }

        /* RESULT POPUP */
        .res-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; justify-content: center; align-items: center; }
        .res-card { background: var(--panel); border: 2px solid var(--gold); padding: 30px; border-radius: 20px; text-align: center; width: 280px; }

        /* INSTANT QR DEPOSIT MODAL */
        .dep-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9000; justify-content: center; align-items: center; }
        .dep-card { background: #12151a; border: 2px solid var(--gold); padding: 25px; border-radius: 20px; text-align: center; width: 85%; }
        .qr-box { background: white; padding: 10px; border-radius: 12px; display: inline-block; margin: 15px 0; border: 3px solid var(--gold); }
        .utr-in { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; margin-bottom: 10px; text-align: center; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <div class="acc-info" onclick="switchAcc()">
        <div id="acc-type" style="font-size: 9px; color: var(--gold); font-weight: bold;">DEMO ACCOUNT</div>
        <div id="acc-bal" class="bal">₹10,000.00</div>
    </div>
    <button onclick="showDep(true)" style="background:var(--green); border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">DEPOSIT</button>
</div>

<div id="chart-zone">
    <div id="trading-engine" style="height:100%;"></div>
</div>

<div class="trade-pad">
    <div class="grid-inputs">
        <div class="box">INVESTMENT<b>₹1,000</b></div>
        <div class="box">TIMER<b>1:00 MIN</b></div>
    </div>
    <div class="btn-row">
        <button class="m-btn up" onclick="trade()">↑</button>
        <button class="m-btn down" onclick="trade()">↓</button>
    </div>
</div>

<div id="res-screen" class="res-modal">
    <div class="res-card">
        <h2 id="res-title" style="margin:0; font-size:14px; color:#888;">TRADE EXPIRED</h2>
        <div id="res-amt" style="font-size:45px; font-weight:900; margin:10px 0; color:var(--red);">₹0.00</div>
        <button onclick="closeRes()" style="background:none; border:1px solid #333; color:#fff; padding:8px 25px; border-radius:5px; margin-top:15px; cursor:pointer;">CONTINUE</button>
    </div>
</div>

<div id="dep-screen" class="dep-modal">
    <div class="dep-card">
        <h3 style="color:var(--gold); margin:0;">FAST DEPOSIT (MIN ₹1,000)</h3>
        <div class="qr-box">
            <img src="https://raw.githubusercontent.com/americankinga-a11y/ARCHITECT/main/1000006609.png" width="200" alt="Payment QR">
        </div>
        <p style="font-size:12px; color:#aaa; margin-bottom:10px;">स्कैन करें और पेमेंट के बाद UTR नंबर डालें</p>
        <input type="number" id="dep-amt" class="utr-in" placeholder="Amount (Min ₹1,000)" value="1000">
        <input type="text" id="utr" class="utr-in" placeholder="12-Digit UTR Number">
        <button onclick="fastSync()" style="width:100%; background:var(--green); border:none; padding:15px; border-radius:10px; font-weight:bold; cursor:pointer;">VERIFY & SYNC</button>
        <p onclick="showDep(false)" style="margin-top:15px; color:#444; cursor:pointer; font-size:12px;">Back to Terminal</p>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    new TradingView.widget({
        "autosize": true, "symbol": "BITSTAMP:BTCUSD", "interval": "1",
        "theme": "dark", "style": "1", "container_id": "trading-engine",
        "hide_top_toolbar": true, "hide_legend": true, "backgroundColor": "#05070a", "studies": []
    });

    let demo = 10000; let real = 0; let isDemo = true;

    function showDep(s) { document.getElementById('dep-screen').style.display = s ? 'flex' : 'none'; }
    function closeRes() { document.getElementById('res-screen').style.display = 'none'; }
    function switchAcc() {
        isDemo = !isDemo;
        document.getElementById('acc-type').innerText = isDemo ? "DEMO ACCOUNT" : "REAL ACCOUNT (ARC)";
        update();
    }

    function fastSync() {
        let amt = document.getElementById('dep-amt').value;
        let utr = document.getElementById('utr').value;

        if(amt < 1000) { 
            alert("मैक्सिमम डिपॉजिट ₹1,000 है। इससे नीचे स्वीकार नहीं है।"); 
            return; 
        }
        if(utr.length < 10) { 
            alert("कृपया सही UTR नंबर डालें।"); 
            return; 
        }

        alert("ARC Node: भुगतान की पुष्टि की जा रही है...");
        setTimeout(() => {
            real += parseInt(amt);
            if(isDemo) switchAcc();
            update();
            showDep(false);
            alert("सफलता! ₹" + amt + " आपके वॉलेट में जोड़ दिए गए हैं।");
        }, 1500);
    }

    function trade() {
        let bal = isDemo ? demo : real;
        if(bal < 1000) { alert("Insufficient Fund. Please Deposit."); return; }
        if(isDemo) demo -= 1000; else real -= 1000;
        update();

        setTimeout(() => {
            document.getElementById('res-screen').style.display = 'flex';
            update();
        }, 2000);
    }

    function update() {
        let v = isDemo ? demo : real;
        document.getElementById('acc-bal').innerText = "₹" + v.toLocaleString() + ".00";
        document.getElementById('acc-bal').style.color = isDemo ? "white" : "var(--green)";
    }
</script>
</body>
</html>
