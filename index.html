<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect Terminal</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; line-height: 1.6; }
        h1 { border-bottom: 2px solid #0f0; padding-bottom: 10px; text-shadow: 0 0 10px #0f0; }
        #output { margin-top: 20px; padding: 15px; border: 1px solid #333; border-radius: 5px; background: #050505; }
        .alert-box { border-left: 5px solid; padding-left: 10px; margin: 10px 0; background: #111; }
        h2 { color: #fff; margin: 0; }
        h3 { color: #aaa; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>ARCHITECT LIVE TERMINAL</h1>
    <div id="status">Status: Connecting to Binance...</div>
    <div id="output">
        Waiting for first candle... (It takes 1 minute to close a candle)
    </div>

    <script type="module">
        // --- MODULE 1: INDICATOR LIBRARY ---
        function calcEMA(data, period) {
            if (data.length < period) return null;
            const k = 2 / (period + 1);
            let val = data.slice(0, period).reduce((a, b) => a + b, 0) / period;
            for (let i = period; i < data.length; i++) val = data[i] * k + val * (1 - k);
            return val;
        }

        function calcRSI(data, period = 14) {
            if (data.length < period + 1) return null;
            const slice = data.slice(-(period + 1));
            let gains = 0, losses = 0;
            for (let i = 1; i < slice.length; i++) {
                const d = slice[i] - slice[i - 1];
                if (d > 0) gains += d; else losses -= d;
            }
            const avgGain = gains / period, avgLoss = losses / period;
            if (avgLoss === 0) return 100;
            return 100 - (100 / (1 + avgGain / avgLoss));
        }

        function calcBollingerBands(data, period = 20, stdDevMult = 2) {
            if (data.length < period) return null;
            const slice = data.slice(-period);
            const mean = slice.reduce((a, b) => a + b, 0) / period;
            const variance = slice.reduce((a, b) => a + (b - mean) ** 2, 0) / period;
            const std = Math.sqrt(variance);
            return { upper: mean + stdDevMult * std, middle: mean, lower: mean - stdDevMult * std };
        }

        function calcMACD(data, fast = 12, slow = 26, signal = 9) {
            if (data.length < slow + signal) return null;
            const fastEMA = calcEMA(data, fast);
            const slowEMA = calcEMA(data, slow);
            if (fastEMA === null || slowEMA === null) return null;
            const macdLine = fastEMA - slowEMA;
            return { line: macdLine, signal: null, histogram: 0 }; // Simplified for live
        }

        // --- MODULE 2: SCORE AGGREGATOR ---
        function computeScore(prices) {
            if (prices.length < 30) return null;
            const price = prices[prices.length - 1];
            const rsi = calcRSI(prices, 14);
            const bb = calcBollingerBands(prices, 20, 2);
            
            let weightedSum = 0;
            if (rsi) weightedSum += (rsi - 50) / 50;
            if (bb) weightedSum += (price < bb.lower) ? 0.5 : (price > bb.upper) ? -0.5 : 0;

            const score = Math.max(0, Math.min(100, Math.round(50 + weightedSum * 50)));
            return { score, price, confluence: score >= 80 ? 'BULL' : score <= 20 ? 'BEAR' : 'NONE' };
        }

        // --- MODULE 3 & 4: CLASSES ---
        class AlertEngine {
            constructor({ callThreshold = 80, putThreshold = 20, onAlert }) {
                this.callThreshold = callThreshold;
                this.putThreshold = putThreshold;
                this.onAlert = onAlert;
                this._lastFired = null;
            }
            evaluate(result) {
                if (result.score >= this.callThreshold && this._lastFired !== 'CALL') {
                    this._lastFired = 'CALL';
                    this.onAlert({ type: 'CALL', score: result.score });
                } else if (result.score <= this.putThreshold && this._lastFired !== 'PUT') {
                    this._lastFired = 'PUT';
                    this.onAlert({ type: 'PUT', score: result.score });
                } else if (result.score > 40 && result.score < 60) {
                    this._lastFired = null; // Reset in neutral zone
                }
            }
        }

        class CandleBuffer {
            constructor(max = 300) { this.closes = []; this.max = max; }
            push(c) { this.closes.push(c); if (this.closes.length > this.max) this.closes.shift(); }
            get() { return this.closes; }
        }

        class BinanceFeed {
            constructor(symbol, onCandle) {
                this.symbol = symbol;
                this.onCandle = onCandle;
            }
            connect() {
                const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${this.symbol}@kline_1m`);
                ws.onopen = () => document.getElementById('status').innerText = "Status: Live & Connected";
                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data.k.x) this.onCandle({ close: parseFloat(data.k.c) });
                };
            }
        }

        // --- WIRING: THE FINAL CONNECTION ---
        const outputDiv = document.getElementById('output');
        const myBuffer = new CandleBuffer(300);
        
        const myAlerts = new AlertEngine({
            onAlert: (alert) => {
                const color = alert.type === 'CALL' ? '#00ff00' : '#ff0000';
                outputDiv.innerHTML += `<div class="alert-box" style="border-color:${color}">[${new Date().toLocaleTimeString()}] ALERT: ${alert.type} (Score: ${alert.score})</div>`;
            }
        });

        const myFeed = new BinanceFeed('btcusdt', (candle) => {
            myBuffer.push(candle.close);
            const result = computeScore(myBuffer.get());
            if (result) {
                outputDiv.innerHTML = `<h2>Live BTC: $${result.price}</h2><h3>Current Score: ${result.score}</h3>` + outputDiv.innerHTML;
                myAlerts.evaluate(result);
            }
        });

        myFeed.connect();
    </script>
</body>
</html>
