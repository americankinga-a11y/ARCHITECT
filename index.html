<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARCHITECT | Strategic Dashboard</title>
    <style>
        body { 
            background-color: #050505; 
            color: #d4af37; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
            user-select: none;
            overflow-x: hidden;
        }
        .container { 
            padding: 20px; 
            max-width: 550px; 
            margin: auto; 
        }
        .logo { 
            width: 110px; 
            height: 110px;
            border-radius: 50%; 
            border: 2px solid #d4af37; 
            margin-top: 25px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transition: transform 0.5s;
        }
        .logo:hover { transform: rotate(360deg); }
        
        h1 {
            letter-spacing: 6px;
            margin: 20px 0 5px 0;
            font-size: 26px;
            font-weight: 300;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .status-tag {
            font-size: 10px;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .card { 
            background: linear-gradient(145deg, #111, #080808);
            border: 1px solid #222; 
            border-radius: 15px; 
            padding: 20px; 
            margin: 15px 0; 
            border-left: 4px solid #d4af37;
            position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.8);
        }

        .balance-label {
            font-size: 12px;
            color: #d4af37;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .balance-value {
            font-size: 38px; 
            color: #ffffff;
            font-weight: bold;
        }
        .arc-symbol {
            font-size: 18px;
            color: #d4af37;
            margin-left: 5px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn { 
            background: #d4af37; 
            color: #000; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            width: 100%; 
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-gold { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728); }

        #chart_box { 
            height: 420px; 
            width: 100%; 
            border-radius: 12px; 
            overflow: hidden;
            border: 1px solid #333;
            margin-top: 10px;
        }

        .footer-legal {
            margin-top: 40px;
            font-size: 9px;
            color: #444;
            line-height: 1.6;
            padding-bottom: 30px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="container">
        <img src="https://raw.githubusercontent.com/americankinga-a11y/ARCHITECT/main/1000006643.png" class="logo" alt="ARCHITECT">
        
        <h1>THE ARCHITECT</h1>
        <div class="status-tag">System Active | Secure Node</div>

        <div class="card" style="border-left-color: #00ff00;">
            <div class="balance-label">Architect Liquid Assets</div>
            <div class="balance-value">0.00 <span class="arc-symbol">ARC</span></div>
            <div style="font-size: 11px; margin-top: 10px; color: #666;">Current Rate: 1 ARC = ₹100.00</div>
        </div>

        <div class="card">
            <div class="balance-label">Network Tier Activation</div>
            <div class="btn-group">
                <button class="btn" onclick="alert('Silver Protocol Initiated')">SILVER (₹299)</button>
                <button class="btn btn-gold" onclick="alert('Gold Mastermind Protocol Initiated')">GOLD (₹999)</button>
            </div>
        </div>

        <div class="card" style="border-left-color: #d4af37;">
            <div class="balance-label">Market Intelligence Feed</div>
            <div id="chart_box">
                <div id="tradingview_54321"></div>
            </div>
        </div>

        <div class="footer-legal">
            PROPRIETARY TECHNOLOGY OF THE ARCHITECT <br>
            THIS IS A SKILL-BASED STRATEGIC INTERFACE. NOT FINANCIAL ADVICE. <br>
            ALL MOVES ARE LOGGED BY THE SYSTEM.
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "width": "100%",
            "height": 420,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "1",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": true,
            "save_image": false,
            "container_id": "tradingview_54321"
        });
    </script>
</body>
</html>
