<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ARCHITECT | Alpha Node V7</title>
    <style>
        :root { --gold: #d4af37; --black: #06080a; --green: #00e676; --red: #ff1744; --dark: #12151a; }
        body { background: var(--black); color: white; font-family: 'Roboto', sans-serif; margin: 0; overflow: hidden; height: 100vh; user-select: none; }
        
        #chart-zone { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .overlay-ui { position: relative; z-index: 10; pointer-events: none; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .top-nav { pointer-events: auto; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(18, 21, 26, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid #333; }
        
        .acc-panel { background: rgba(0,0,0,0.7); border: 1px solid var(--gold); padding: 5px 15px; border-radius: 8px; cursor: pointer; }
        .acc-type { color: var(--gold); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .acc-bal { font-size: 16px; font-weight: 900; letter-spacing: 1px; }

        .trade-pad { pointer-events: auto; background: rgba(18, 21, 26, 0.95); padding: 15px 20px 25px; border-radius: 25px 25px 0 0; border-top: 2px solid #333; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .control-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .tile { flex: 1; background: #000; border: 1px solid #444; padding: 8px; border-radius: 10px; text-align: center; }
        .label { font-size: 9px; color: #888; margin-bottom: 3px; font-weight: bold; text-transform: uppercase; }
        
        .input-box { background: transparent; border: none; color: white; font-size: 16px; font-weight: bold; width: 90%; text-align: center; outline: none; }
        select { background: black; color: white; border: none; font-size: 14px; font-weight: bold; outline: none; cursor: pointer; }

        .btn-group { display: flex; gap: 12px; }
        .action-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 22px; font-weight: 900; cursor: pointer; transition: 0.1s; text-transform: uppercase; }
        .call { background: var(--green); color: black; box-shadow: 0 5px 0 #009e4f; }
        .put { background: var(--red); color: white; box-shadow: 0 5px 0 #b31230; }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; justify-content: center; align-items: center; }
        .modal-card { background: var(--dark); border: 2px solid var(--gold); padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; pointer-events: auto; }
        .qr-frame { background: white; padding: 10px; border-radius: 10px; display: inline-block; margin: 15px 0; border: 5px solid var(--gold); }
    </style>
</head>
<body>

<div id="chart-zone">
    <div id="tv_engine" style="height:100%;"></div>
</div>

<div class="overlay-ui">
    <div class="top-nav">
        <div class="acc-panel" onclick="switchAcc()">
            <div class="acc-type" id="acc-label">DEMO ACCOUNT</div>
            <div class="acc-bal" id="acc-amount">₹10,000.00</div>
        </div>
        <button style="background:var(--green); border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer;" onclick="toggleVault(true)">DEPOSIT</button>
    </div>

    <div class="trade-pad">
        <div class="control-row">
            <div class="tile">
                <div class="label">Timeframe</div>
                <select id="t-frame">
                    <option value="5S">5 Seconds</option>
                    <option value="15S">15 Seconds</option>
                    <option value="30S">30 Seconds</option>
                    <option value="1" selected>1 Minute</option>
                    <option value="30">30 Minutes</option>
                    <option value="60">1 Hour</option>
                    <option value="D">1 Day</option>
                </select>
            </div>
            <div class="tile">
                <div class="label">Investment (₹)</div>
                <input type="number" id="trade-amount" class="input-box" value="1000" min="100" max="300000">
            </div>
            <div class="tile">
                <div class="label">ARC Val</div>
                <div id="arc-display" style="color:var(--gold); font-weight:bold;">10 ARC</div>
            </div>
        </div>
        <div class="btn-group">
            <button class="action-btn call" onclick="startTrade('CALL')">↑ UP</button>
            <button class="action-btn put" onclick="startTrade('PUT')">↓ DOWN</button>
        </div>
    </div>
</div>

<div id="vault-modal" class="modal">
    <div class="modal-card">
        <h2 style="color:var(--gold); margin-top:0;">ARC VAULT SYNC</h2>
        <div class="qr-frame">
            <img src="https://raw.githubusercontent.com/americankinga-a11y/ARCHITECT/main/1000006609.png" width="200" style="display:block;">
        </div>
        <input type="text" placeholder="Enter 12-Digit UTR" style="width:100%; padding:15px; margin-bottom:15px; background:#000; border:1px solid #333; color:white; border-radius:8px; text-align:center;">
        <button style="width:100%; padding:15px; background:var(--green); border:none; border-radius:10px; font-weight:bold;" onclick="alert('Syncing with Node ARC-V7...')">CONFIRM DEPOSIT</button>
        <p onclick="toggleVault(false)" style="margin-top:20px; font-size:12px; color:#555; cursor:pointer;">Exit Encryption</p>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let widget = new TradingView.widget({
        "width": "100%", "height": "100%", "symbol": "BINANCE:BTCUSDT",
        "interval": "1", "theme": "dark", "style": "1", "container_id": "tv_engine",
        "hide_top_toolbar": true, "hide_legend": true, "backgroundColor": "#06080a"
    });

    let balance = 10000;
    let isDemo = true;

    // टाइमफ्रेम अपडेट लॉजिक
    document.getElementById('t-frame').addEventListener('change', function(e) {
        alert("Node ARC-V7: Switching to " + e.target.value + " Timeframe.");
    });

    // इन्वेस्टमेंट और ARC अपडेट
    document.getElementById('trade-amount').addEventListener('input', function(e) {
        let val = e.target.value;
        document.getElementById('arc-display').innerText = (val / 100).toFixed(0) + " ARC";
    });

    function startTrade(type) {
        let amt = parseInt(document.getElementById('trade-amount').value);

        // आपकी नई शर्तें: ₹100 से ₹3,00,000
        if(amt < 100 || amt > 300000) {
            alert("Limit Error: Min ₹100 - Max ₹3,00,000");
            return;
        }

        if(!isDemo) {
            alert("Insufficient Real Assets. Redirecting to Deposit...");
            toggleVault(true);
            return;
        }

        if(balance < amt) {
            alert("Insufficient Demo Balance.");
            return;
        }

        balance -= amt;
        updateUI();
        
        alert(`[ARC-V7] ${type} Order Placed: ₹${amt.toLocaleString()}\nAnalyzing Market Vectors...`);
        
        setTimeout(() => {
            const win = Math.random() > 0.4;
            if(win) {
                let profit = amt * 1.85;
                balance += profit;
                alert(`PROFIT! ₹${profit.toFixed(0)} credited to Vault.`);
            } else {
                alert("LOSS. Market Volatility Detected.");
            }
            updateUI();
        }, 2000);
    }

    function updateUI() {
        document.getElementById('acc-amount').innerText = "₹" + balance.toLocaleString() + ".00";
    }

    function switchAcc() {
        isDemo = !isDemo;
        document.getElementById('acc-label').innerText = isDemo ? "DEMO ACCOUNT" : "REAL ACCOUNT";
        document.getElementById('acc-amount').innerText = isDemo ? "₹" + balance.toLocaleString() + ".00" : "₹0.00";
        document.getElementById('acc-amount').style.color = isDemo ? "white" : "#ff1744";
    }

    function toggleVault(show) {
        document.getElementById('vault-modal').style.display = show ? 'flex' : 'none';
    }
</script>
</body>
</html>
