<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ARCHITECT PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #0b0e11; --green: #00c853; --red: #ff3d00; --panel: #151921; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: white; font-family: 'Roboto', sans-serif; overflow: hidden; }

        /* प्रोफेशनल हेडर */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: var(--panel); height: 50px; border-bottom: 1px solid #2a2e39; }
        .balance-section { display: flex; align-items: center; gap: 10px; }
        .bal-box { background: #1e222d; padding: 5px 12px; border-radius: 4px; border: 1px solid #363c4e; }
        .bal-val { font-weight: 900; color: var(--gold); font-size: 16px; }

        /* साइड नेविगेशन */
        .sidebar { position: fixed; left: 0; top: 50px; bottom: 0; width: 45px; background: var(--panel); display: flex; flex-direction: column; align-items: center; gap: 20px; padding-top: 20px; border-right: 1px solid #2a2e39; z-index: 10; }
        .side-icon { color: #5d6670; font-size: 18px; cursor: pointer; }

        /* मेन चार्ट एरिया */
        #chart-container { width: calc(100% - 45px); height: calc(100vh - 200px); margin-left: 45px; margin-top: 0; background: var(--bg); }

        /* ट्रेडिंग पैनल */
        .trade-controls { position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid #2a2e39; }
        .input-group { background: #1e222d; border-radius: 8px; padding: 8px; border: 1px solid #363c4e; }
        .input-label { font-size: 10px; color: #707a8a; display: block; }
        .input-val { font-size: 14px; font-weight: bold; }

        .btn-trade { height: 60px; border: none; border-radius: 8px; font-size: 24px; font-weight: 900; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .up { background: var(--green); }
        .down { background: var(--red); color: #fff; }

        /* मॉडल्स */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-card { background: var(--panel); border: 1px solid var(--gold); padding: 20px; border-radius: 12px; width: 85%; max-width: 300px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div style="color: var(--gold); font-weight: 900; font-size: 18px;">L</div>
    <div class="balance-section">
        <div class="bal-box"><span class="input-label">LIVE ACCOUNT</span><span id="acc-bal" class="bal-val">₹10,480.00</span></div>
        <button onclick="openModal('dep-modal')" style="background:var(--green); border:none; padding:8px 12px; border-radius:4px; font-weight:bold; font-size:12px;">DEPOSIT</button>
    </div>
</div>

<div class="sidebar">
    <div class="side-icon">☰</div>
    <div class="side-icon">🕒</div>
    <div class="side-icon">⚙️</div>
</div>

<div id="chart-container"></div>

<div class="trade-controls">
    <div class="input-group">
        <span class="input-label">INVESTMENT</span>
        <span class="input-val">₹1,000</span>
    </div>
    <div class="input-group">
        <span class="input-label">TIME</span>
        <span class="input-val">01:00</span>
    </div>
    <button class="btn-trade up" onclick="trade('UP')">↑</button>
    <button class="btn-trade down" onclick="trade('DOWN')">↓</button>
</div>

<div id="dep-modal" class="modal">
    <div class="modal-card">
        <h3 style="color:var(--gold)">FAST DEPOSIT</h3>
        <img src="https://i.ibb.co/6RTPv4n/1000006606.png" style="width:100%; border-radius:8px; margin-bottom:15px;">
        <p style="font-size:12px;">UPI ID: 7251072316@ptaxis</p>
        <button onclick="closeModals()" style="background:var(--gold); border:none; width:100%; padding:10px; border-radius:5px; font-weight:bold;">DONE</button>
    </div>
</div>

<script>
    let balance = 10480;
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    // असली मार्केट चार्ट इंजन
    const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
        layout: { backgroundColor: '#0b0e11', textColor: '#707a8a' },
        grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
        priceScale: { borderColor: '#2a2e39' },
        timeScale: { borderColor: '#2a2e39', timeVisible: true }
    });

    const candleSeries = chart.addCandlestickSeries({
        upColor: '#00c853', downColor: '#ff3d00', borderVisible: false, wickUpColor: '#00c853', wickDownColor: '#ff3d00'
    });

    // लाइव बाइनेंस डेटा फीड
    fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100')
        .then(res => res.json())
        .then(data => {
            const formattedData = data.map(d => ({
                time: d[0] / 1000, open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4])
            }));
            candleSeries.setData(formattedData);
        });

    const socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_1m');
    socket.onmessage = (e) => {
        const k = JSON.parse(e.data).k;
        candleSeries.update({ time: k.t/1000, open: parseFloat(k.o), high: parseFloat(k.h), low: parseFloat(k.l), close: parseFloat(k.c) });
    };

    function trade(dir) {
        if(balance < 1000) return alert("Paisa khatam!");
        balance -= 1000; updateUI();
        setTimeout(() => {
            let win = Math.random() > 0.7; // Architect Control
            if(win) { balance += 1870; alert("PROFIT!"); }
            else { alert("LOSS!"); }
            updateUI();
        }, 5000);
    }

    function updateUI() { document.getElementById('acc-bal').innerText = "₹" + balance.toLocaleString(); }
</script>
</body>
</html>
