<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARCHITECT PRO TERMINAL</title>

  <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #00ff00;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    header {
      height: 55px;
      padding: 10px 15px;
      border-bottom: 1px solid #111;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #050505;
    }

    header h2 {
      margin: 0;
      font-size: 16px;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
      letter-spacing: 1px;
    }

    .vip-badge {
      padding: 7px 12px;
      border: 1px solid gold;
      color: gold;
      border-radius: 8px;
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      height: calc(100vh - 55px);
    }

    #chart-container {
      width: 100%;
      height: 100%;
      background: #000;
      position: relative;
    }

    /* Bottom trade bar like Quotex */
    .trade-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0,0,0,0.97);
      border-top: 1px solid #111;
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      z-index: 99;
    }

    .trade-bar input, .trade-bar select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #222;
      background: #000;
      color: #fff;
      width: 110px;
      font-size: 13px;
      outline: none;
    }

    .trade-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .trade-btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .call-btn {
      background: #00ff00;
      color: #000;
      box-shadow: 0 0 12px rgba(0,255,0,0.8);
    }

    .put-btn {
      background: #ff0000;
      color: #fff;
      box-shadow: 0 0 12px rgba(255,0,0,0.8);
    }

    /* Right Panel */
    .panel {
      background: #050505;
      border-left: 1px solid #111;
      padding: 12px;
      overflow-y: auto;
    }

    .box {
      border: 1px solid #222;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      background: #0a0a0a;
    }

    .price-display {
      font-size: 20px;
      color: white;
      margin: 0;
      font-weight: bold;
    }

    .muted {
      color: #aaa;
      font-size: 12px;
      margin-top: 4px;
    }

    #output {
      max-height: 250px;
      overflow-y: auto;
      border: 1px solid #222;
      padding: 10px;
      border-radius: 10px;
      background: #070707;
      font-size: 12px;
    }

    .alert-box {
      border-left: 5px solid;
      padding: 10px;
      margin: 8px 0;
      background: #111;
      font-weight: bold;
      border-radius: 6px;
    }

    .trade-box {
      border: 1px solid #222;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      background: #0b0b0b;
      font-size: 13px;
      color: white;
    }

    .trade-box div {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #111;
    }

    .trade-box div:last-child {
      border-bottom: none;
    }

    .leaderboard div {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #111;
      font-size: 12px;
      color: white;
    }

    .leaderboard div:last-child {
      border-bottom: none;
    }

    .tournament-btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: gold;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }

    /* Floating expiry countdown like Quotex */
    .expiry-float {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(0,0,0,0.7);
      border: 1px solid #111;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      color: white;
      z-index: 99;
    }

    /* Mobile Responsive */
    @media(max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .panel { display: none; }
    }
  </style>
</head>

<body>

<header>
  <h2>ARCHITECT REAL MARKET PRO</h2>
  <div class="vip-badge" onclick="showVIP()">VIP ₹2999 / ₹5999</div>
</header>

<div class="layout">

  <!-- Chart Section -->
  <div id="chart-container">

    <div class="expiry-float" id="expiryFloat">
      Expiry Countdown: --
    </div>

    <!-- Quotex Style Bottom Bar -->
    <div class="trade-bar">
      <input id="amount" type="number" value="10" min="1" />

      <select id="expiry">
        <option value="1">1m</option>
        <option value="3">3m</option>
        <option value="5">5m</option>
      </select>

      <button class="trade-btn call-btn" onclick="placeTrade('CALL')">CALL</button>
      <button class="trade-btn put-btn" onclick="placeTrade('PUT')">PUT</button>
    </div>
  </div>

  <!-- Side Panel -->
  <div class="panel">

    <div class="box">
      <p class="price-display" id="price">Loading...</p>
      <p id="score-text" class="muted">RSI Score: --</p>
      <p id="connection" class="muted">Status: Connecting...</p>
      <p class="muted" id="timer">Candle Close: --</p>
    </div>

    <div class="box">
      <b style="color:white;">Account & Trading</b>

      <div class="trade-box">
        <div><b>Balance:</b> <span id="balance">$1000</span></div>
        <div><b>Open Trades:</b> <span id="openTrades">0</span></div>
        <div><b>Profit Today:</b> <span id="profitToday">$0</span></div>
        <div><b>Payout:</b> <span id="payout">80%</span></div>
      </div>

      <button class="tournament-btn" onclick="joinTournament()">🏆 Join Tournament</button>
      <p class="muted" id="tournamentStatus">Tournament: Not Joined</p>
    </div>

    <div class="box">
      <b style="color:white;">Live Signals & Trades</b>
      <div id="output"></div>
    </div>

    <div class="box">
      <b style="color:white;">🏆 Tournament Leaderboard</b>
      <div class="leaderboard" id="leaderboard"></div>
    </div>

  </div>

</div>

<script>
  const chartContainer = document.getElementById("chart-container");

  const chartDiv = document.createElement("div");
  chartDiv.style.width = "100%";
  chartDiv.style.height = "calc(100% - 70px)";
  chartDiv.style.position = "absolute";
  chartDiv.style.top = "0";
  chartDiv.style.left = "0";
  chartDiv.style.right = "0";
  chartDiv.style.bottom = "70px";
  chartContainer.appendChild(chartDiv);

  const chart = LightweightCharts.createChart(chartDiv, {
    width: chartDiv.clientWidth,
    height: chartDiv.clientHeight,
    layout: {
      background: { color: "#000000" },
      textColor: "#00ff00",
    },
    grid: {
      vertLines: { color: "#111" },
      horzLines: { color: "#111" },
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal,
    },
    timeScale: {
      timeVisible: true,
      secondsVisible: false,
      borderColor: "#111"
    },
    rightPriceScale: {
      borderColor: "#111"
    }
  });

  const candleSeries = chart.addCandlestickSeries({
    upColor: "#00ff00",
    downColor: "#ff0000",
    wickUpColor: "#00ff00",
    wickDownColor: "#ff0000",
    borderVisible: false,
  });

  function resizeChart() {
    chart.applyOptions({
      width: chartDiv.clientWidth,
      height: chartDiv.clientHeight
    });
  }

  window.addEventListener("resize", resizeChart);
  setTimeout(resizeChart, 500);

  // -----------------------------
  // RSI CALCULATION
  // -----------------------------
  function calcRSI(prices, period = 14) {
    if (prices.length < period + 1) return 50;

    let gains = 0;
    let losses = 0;

    for (let i = prices.length - period; i < prices.length; i++) {
      const diff = prices[i] - prices[i - 1];
      if (diff > 0) gains += diff;
      else losses -= diff;
    }

    const avgGain = gains / period;
    const avgLoss = losses / period || 1;
    const rs = avgGain / avgLoss;

    return Math.round(100 - (100 / (1 + rs)));
  }

  let lastSignal = "";
  function sendAlert(type, score, price) {
    if (lastSignal === type) return;
    lastSignal = type;

    const output = document.getElementById("output");
    const color = type === "CALL" ? "#00ff00" : "#ff0000";

    const html = `
      <div class="alert-box" style="border-color:${color}; color:${color}">
        [${new Date().toLocaleTimeString()}] ${type} SIGNAL<br>
        Price: $${price.toFixed(2)}<br>
        RSI: ${score}
      </div>
    `;
    output.insertAdjacentHTML("afterbegin", html);
  }

  // -----------------------------
  // LOAD HISTORY
  // -----------------------------
  async function loadHistory() {
    try {
      const url = "https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=300";
      const res = await fetch(url);
      const data = await res.json();

      const candles = data.map(d => ({
        time: d[0] / 1000,
        open: parseFloat(d[1]),
        high: parseFloat(d[2]),
        low: parseFloat(d[3]),
        close: parseFloat(d[4]),
      }));

      candleSeries.setData(candles);
      chart.timeScale().fitContent();
    } catch (err) {
      console.log("History load failed:", err);
    }
  }

  loadHistory();

  // -----------------------------
  // DEMO TRADING SYSTEM
  // -----------------------------
  let balance = 1000;
  let profitToday = 0;
  let openTrades = [];
  let lastPrice = 0;
  let payoutPercent = 80;

  function updateUI() {
    document.getElementById("balance").innerText = `$${balance.toFixed(2)}`;
    document.getElementById("profitToday").innerText = `$${profitToday.toFixed(2)}`;
    document.getElementById("openTrades").innerText = openTrades.length;
    document.getElementById("payout").innerText = `${payoutPercent}%`;
  }

  function addTradeLog(msg, color) {
    const output = document.getElementById("output");
    const html = `
      <div class="alert-box" style="border-color:${color}; color:${color}">
        [${new Date().toLocaleTimeString()}] ${msg}
      </div>
    `;
    output.insertAdjacentHTML("afterbegin", html);
  }

  function placeTrade(type) {
    const amount = parseFloat(document.getElementById("amount").value);
    const expiry = parseInt(document.getElementById("expiry").value);

    if (amount <= 0) return alert("Enter valid amount!");
    if (amount > balance) return alert("Insufficient balance!");
    if (lastPrice === 0) return alert("Price loading, wait...");

    balance -= amount;

    const trade = {
      id: Date.now(),
      type,
      amount,
      entryPrice: lastPrice,
      entryTime: Date.now(),
      expiryTime: Date.now() + expiry * 60 * 1000,
      resolved: false,
      entryLine: candleSeries.createPriceLine({
        price: lastPrice,
        color: type === "CALL" ? "#00ff00" : "#ff0000",
        lineWidth: 2,
        lineStyle: LightweightCharts.LineStyle.Solid,
        axisLabelVisible: true,
        title: `${type} ENTRY`,
      })
    };

    openTrades.push(trade);

    addTradeLog(
      `TRADE OPENED: ${type} | $${amount} | Entry: $${lastPrice.toFixed(2)} | Expiry: ${expiry}m`,
      "#00ffff"
    );

    updateUI();
  }

  function resolveTrades(currentPrice) {
    const now = Date.now();

    openTrades.forEach(trade => {
      if (!trade.resolved && now >= trade.expiryTime) {
        trade.resolved = true;

        let win = false;
        if (trade.type === "CALL" && currentPrice > trade.entryPrice) win = true;
        if (trade.type === "PUT" && currentPrice < trade.entryPrice) win = true;

        candleSeries.removePriceLine(trade.entryLine);

        if (win) {
          const payout = trade.amount * (1 + payoutPercent / 100);
          balance += payout;
          profitToday += (payout - trade.amount);

          addTradeLog(`✅ WIN ${trade.type} | +$${(payout - trade.amount).toFixed(2)}`, "#00ff00");
        } else {
          profitToday -= trade.amount;
          addTradeLog(`❌ LOSS ${trade.type} | -$${trade.amount.toFixed(2)}`, "#ff0000");
        }
      }
    });

    openTrades = openTrades.filter(t => !t.resolved);
    updateUI();
  }

  // -----------------------------
  // EXPIRY COUNTDOWN FLOATING
  // -----------------------------
  function updateExpiryCountdown() {
    if (openTrades.length === 0) {
      document.getElementById("expiryFloat").innerText = `Expiry Countdown: --`;
      return;
    }

    const soonest = openTrades.reduce((a, b) => a.expiryTime < b.expiryTime ? a : b);
    const remaining = soonest.expiryTime - Date.now();

    if (remaining <= 0) {
      document.getElementById("expiryFloat").innerText = `Expiry Countdown: 00:00`;
      return;
    }

    const sec = Math.floor(remaining / 1000);
    const min = Math.floor(sec / 60);
    const s = sec % 60;

    document.getElementById("expiryFloat").innerText =
      `Expiry Countdown: ${String(min).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  }

  setInterval(updateExpiryCountdown, 500);

  // -----------------------------
  // TOURNAMENT SYSTEM
  // -----------------------------
  let tournamentJoined = false;

  let leaderboard = [
    { name: "Trader_Alpha", profit: 220 },
    { name: "KingSignal", profit: 170 },
    { name: "MarketSniper", profit: 110 },
    { name: "VIP_Pro", profit: 50 }
  ];

  function updateLeaderboard() {
    leaderboard.sort((a, b) => b.profit - a.profit);
    const box = document.getElementById("leaderboard");
    box.innerHTML = "";

    leaderboard.forEach((u, i) => {
      box.innerHTML += `<div><span>#${i+1} ${u.name}</span><span>$${u.profit}</span></div>`;
    });
  }

  updateLeaderboard();

  function joinTournament() {
    if (tournamentJoined) return alert("You already joined tournament!");

    tournamentJoined = true;
    document.getElementById("tournamentStatus").innerText = "Tournament: Joined ✅";

    addTradeLog("🏆 You joined the tournament! Earn max profit to rank.", "gold");
  }

  function updateUserLeaderboard() {
    if (!tournamentJoined) return;

    const you = leaderboard.find(x => x.name === "YOU");
    if (you) you.profit = Math.round(profitToday);
    else leaderboard.push({ name: "YOU", profit: Math.round(profitToday) });

    updateLeaderboard();
  }

  setInterval(updateUserLeaderboard, 5000);

  // -----------------------------
  // REAL BINANCE FEED + RECONNECT
  // -----------------------------
  const priceHistory = [];
  let ws;

  function connectWS() {
    ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@kline_1m");

    ws.onopen = () => {
      document.getElementById("connection").innerText = "Status: Connected ✅";
      document.getElementById("connection").style.color = "#00ff00";
    };

    ws.onclose = () => {
      document.getElementById("connection").innerText = "Status: Reconnecting...";
      document.getElementById("connection").style.color = "yellow";
      setTimeout(connectWS, 2000);
    };

    ws.onerror = () => {
      document.getElementById("connection").innerText = "Status: Error ⚠️";
      document.getElementById("connection").style.color = "yellow";
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      const k = data.k;

      const candle = {
        time: k.t / 1000,
        open: parseFloat(k.o),
        high: parseFloat(k.h),
        low: parseFloat(k.l),
        close: parseFloat(k.c),
      };

      candleSeries.update(candle);

      const price = candle.close;
      lastPrice = price;

      priceHistory.push(price);
      if (priceHistory.length > 300) priceHistory.shift();

      const rsi = calcRSI(priceHistory);

      document.getElementById("price").innerText = `BTCUSDT: $${price.toFixed(2)}`;

      const scoreEl = document.getElementById("score-text");
      scoreEl.innerText = `RSI Score: ${rsi}`;
      scoreEl.style.color = rsi > 70 ? "#ff0000" : rsi < 30 ? "#00ff00" : "white";

      const closeTime = new Date(k.T).toLocaleTimeString();
      document.getElementById("timer").innerText = `Candle Close: ${closeTime}`;

      // RSI SIGNAL LOGIC (Correct)
      if (rsi <= 20) sendAlert("CALL", rsi, price); // oversold -> up
      if (rsi >= 80) sendAlert("PUT", rsi, price);  // overbought -> down

      resolveTrades(price);
    };
  }

  connectWS();
  updateUI();

  // -----------------------------
  // VIP POPUP
  // -----------------------------
  function showVIP() {
    alert(
`ARCHITECT VIP PLANS:

VIP BASIC: ₹2999 / Month
✔ Premium Tournament Access
✔ VIP Signals
✔ Faster Support

VIP PRO: ₹5999 / Month
✔ Mega Prize Tournament
✔ Higher Payout %
✔ Premium Strategy Access
✔ Dedicated Support

NEXT STEP:
Add Razorpay Payment Gateway + Login System`
    );
  }

</script>

</body>
  </html>
