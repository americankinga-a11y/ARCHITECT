<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ARCHITECT - LIVE INDIA</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json;base64,ewogICAgIm5hbWUiOiAiVEhFIEFSQ0hJVEVDVCIsCiAgICAic2hvcnRfbmFtZSI6ICJBcmNoaXRlY3QiLAogICAgInN0YXJ0X3VybCI6ICIuIiwKICAgICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICAgImJhY2tncm91bmRfY29sb3IiOiAiIzA1MDcwYSIsCiAgICAidGhlbWVfY29sb3IiOiAiIzA1MDcwYSIKfQ==">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #05070a; --green: #00e676; --red: #ff1744; --panel: #0e1116; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }

        /* हेडर */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--panel); border-bottom: 1px solid #1a1a1a; height: 60px; position: fixed; top: 0; width: 100%; z-index: 100; box-sizing: border-box; }
        .logo-box { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        #main-logo { height: 35px; border: 1px solid var(--gold); border-radius: 4px; }
        .acc-info { border-left: 2px solid var(--gold); padding-left: 10px; }

        .head-btns { display: flex; gap: 8px; }
        .h-btn { border: none; padding: 7px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 10px; font-family: 'Inter'; transition: 0.1s; }
        .dep-btn { background: var(--green); color: #000; }
        .wd-btn { background: #1a1d23; color: white; border: 1px solid #333; }

        /* चार्ट */
        #chart-container { width: 100%; height: calc(100vh - 230px); margin-top: 60px; background: var(--bg); position: relative; }

        /* ट्रेड कंट्रोल्स */
        .trade-pad { position: fixed; bottom: 0; width: 100%; background: var(--panel); padding: 15px; border-top: 1px solid #222; z-index: 100; box-sizing: border-box; border-radius: 20px 20px 0 0; }
        .grid-inputs { display: flex; gap: 10px; margin-bottom: 15px; }
        .box { flex: 1; background: #000; border-radius: 10px; border: 1px solid #222; padding: 10px; text-align: center; }
        .box span { font-size: 10px; color: #777; display: block; margin-bottom: 3px; }
        .box b { font-size: 14px; }

        .btn-row { display: flex; gap: 15px; }
        .m-btn { flex: 1; padding: 18px; border: none; border-radius: 12px; font-size: 30px; font-weight: 900; cursor: pointer; }
        .up { background: var(--green); color: #000; }
        .down { background: var(--red); color: #fff; }

        /* मॉडल्स */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal.open { display: flex; }
        .card { background: var(--panel); border: 1px solid var(--gold); padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; box-sizing: border-box; position: relative; }
        .close-icon { position: absolute; top: 15px; right: 20px; font-size: 20px; color: #555; cursor: pointer; }

        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; font-family: 'Inter'; box-sizing: border-box; }
        .action-btn { width: 100%; background: var(--gold); border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-box" onclick="location.reload()">
        <img src="https://i.ibb.co/Xz95p6F/logo.png" id="main-logo" alt="ARCHITECT">
        <div class="acc-info">
            <div style="font-size: 8px; color: var(--gold); font-weight: 900;">LIVE INR MARKET</div>
            <div id="acc-bal" style="font-size: 18px; font-weight: 900;">₹10,000.00</div>
        </div>
    </div>
    <div class="head-btns">
        <button class="h-btn dep-btn" onclick="openModal('dep-modal')">DEPOSIT</button>
        <button class="h-btn wd-btn" onclick="openModal('wd-modal')">WITHDRAW</button>
    </div>
</div>

<div id="chart-container"></div>

<div class="trade-pad">
    <div class="grid-inputs">
        <div class="box"><span>INVEST</span><b>₹1,000</b></div>
        <div class="box"><span>PAYOUT</span><b style="color:var(--green)">88%</b></div>
        <div class="box"><span>TIME</span><b>01:00</b></div>
    </div>
    <div class="btn-row">
        <button class="m-btn up" onclick="placeTrade('UP')">↑</button>
        <button class="m-btn down" onclick="placeTrade('DOWN')">↓</button>
    </div>
</div>

<div id="dep-modal" class="modal">
    <div class="card">
        <span class="close-icon" onclick="closeModals()">×</span>
        <h3 style="color:var(--gold)">FAST DEPOSIT</h3>
        <img src="https://i.ibb.co/3sX8M8H/qr-code.png" style="width:200px; background:white; padding:5px; border-radius:10px; margin:10px 0;">
        <div style="background:#1a1d23; padding:8px; border-radius:8px; font-size:11px; color:var(--gold); margin-bottom:10px;">UPI ID: 7251072316@ptaxis</div>
        <input type="text" placeholder="Transaction ID (UTR) यहाँ डालें">
        <button class="action-btn" onclick="alert('Payment Submitted for Verification!')">SUBMIT</button>
    </div>
</div>

<div id="wd-modal" class="modal">
    <div class="card">
        <span class="close-icon" onclick="closeModals()">×</span>
        <h3 style="color:var(--gold)">WITHDRAWAL</h3>
        <input type="number" placeholder="Amount (₹)">
        <input type="text" placeholder="Bank Name / UPI ID">
        <input type="text" placeholder="A/C Holder Name">
        <button class="action-btn" style="background:white; color:black;" onclick="alert('Withdrawal Request Sent!')">SEND REQUEST</button>
    </div>
</div>

<script>
    let balance = 10000;
    let currentPrice = 0;

    function openModal(id) { closeModals(); document.getElementById(id).classList.add('open'); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); }

    // --- असली BINANCE LIVE DATA CHART ---
    const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
        layout: { backgroundColor: '#05070a', textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#0e1116' }, horzLines: { color: '#0e1116' } },
        timeScale: { timeVisible: true, secondsVisible: true }
    });
    const candleSeries = chart.addCandlestickSeries({ upColor: '#00e676', downColor: '#ff1744' });

    // Binance WebSocket (BTC/USDT)
    const binanceSocket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_1m');
    binanceSocket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        const kline = msg.k;
        currentPrice = parseFloat(kline.c);
        candleSeries.update({
            time: kline.t / 1000,
            open: parseFloat(kline.o),
            high: parseFloat(kline.h),
            low: parseFloat(kline.l),
            close: currentPrice
        });
    };

    function placeTrade(dir) {
        if(balance < 1000) return alert("Low Balance!");
        balance -= 1000;
        updateUI();

        // Shadow Control Logic (75% House Advantage)
        setTimeout(() => {
            let win = Math.random() > 0.75; 
            if(win) {
                balance += 1880;
                alert("WIN! ₹1,880 added.");
            } else {
                alert("LOSS! Market Volatility.");
            }
            updateUI();
        }, 5000);
    }

    function updateUI() {
        document.getElementById('acc-bal').innerText = "₹" + balance.toLocaleString();
    }
</script>
</body>
</html>
