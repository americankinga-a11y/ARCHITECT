<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect Terminal</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; line-height: 1.6; }
        h1 { border-bottom: 2px solid #0f0; padding-bottom: 10px; text-shadow: 0 0 10px #0f0; }
        #status-box { margin-bottom: 20px; padding: 15px; border: 1px solid #0f0; background: #050505; border-radius: 5px; }
        #output { margin-top: 20px; }
        .alert-box { border-left: 5px solid; padding: 10px; margin: 10px 0; background: #111; font-weight: bold; }
        .price-display { font-size: 2rem; color: #fff; margin: 0; }
        .score-display { font-size: 1.2rem; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>ARCHITECT LIVE TERMINAL</h1>
    
    <div id="status-box">
        <div id="connection-status">Status: Connecting to Binance...</div>
        <div id="live-data">Waiting for stream...</div>
    </div>

    <div id="output">
        </div>

    <script type="module">
        // --- MODULE 1: INDICATOR LIBRARY ---
        function calcEMA(data, period) {
            if (data.length < period) return null;
            const k = 2 / (period + 1);
            let val = data.slice(0, period).reduce((a, b) => a + b, 0) / period;
            for (let i = period; i < data.length; i++) val = data[i] * k + val * (1 - k);
            return val;
        }

        function calcRSI(data, period = 14) {
            if (data.length < period + 1) return null;
            const slice = data.slice(-(period + 1));
            let gains = 0, losses = 0;
            for (let i = 1; i < slice.length; i++) {
                const d = slice[i] - slice[i - 1];
                if (d > 0) gains += d; else losses -= d;
            }
            const avgGain = gains / period, avgLoss = losses / period;
            if (avgLoss === 0) return 100;
            return 100 - (100 / (1 + avgGain / avgLoss));
        }

        function calcBollingerBands(data, period = 20, stdDevMult = 2) {
            if (data.length < period) return null;
            const slice = data.slice(-period);
            const mean = slice.reduce((a, b) => a + b, 0) / period;
            const variance = slice.reduce((a, b) => a + (b - mean) ** 2, 0) / period;
            const std = Math.sqrt(variance);
            return { upper: mean + stdDevMult * std, middle: mean, lower: mean - stdDevMult * std };
        }

        // --- MODULE 2: SCORE AGGREGATOR ---
        function computeScore(prices) {
            if (prices.length < 30) return 50; // Provide neutral score until buffer fills
            const price = prices[prices.length - 1];
            const rsi = calcRSI(prices, 14);
            const bb = calcBollingerBands(prices, 20, 2);
            
            let weightedSum = 0;
            if (rsi) weightedSum += (rsi - 50) / 50;
            if (bb) weightedSum += (price < bb.lower) ? 0.5 : (price > bb.upper) ? -0.5 : 0;

            return Math.max(0, Math.min(100, Math.round(50 + weightedSum * 50)));
        }

        // --- MODULE 3 & 4: CLASSES ---
        class AlertEngine {
            constructor({ callThreshold = 85, putThreshold = 15, onAlert }) {
                this.callThreshold = callThreshold;
                this.putThreshold = putThreshold;
                this.onAlert = onAlert;
                this._lastFired = null;
            }
            evaluate(score, price) {
                if (score >= this.callThreshold && this._lastFired !== 'CALL') {
                    this._lastFired = 'CALL';
                    this.onAlert({ type: 'CALL', score, price });
                } else if (score <= this.putThreshold && this._lastFired !== 'PUT') {
                    this._lastFired = 'PUT';
                    this.onAlert({ type: 'PUT', score, price });
                } else if (score > 40 && score < 60) {
                    this._lastFired = null; 
                }
            }
        }

        class CandleBuffer {
            constructor(max = 300) { this.closes = []; this.max = max; }
            push(c) { this.closes.push(c); if (this.closes.length > this.max) this.closes.shift(); }
            get() { return this.closes; }
        }

        class BinanceFeed {
            constructor(symbol, onTick) {
                this.symbol = symbol;
                this.onTick = onTick;
            }
            connect() {
                const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${this.symbol}@kline_1m`);
                ws.onopen = () => document.getElementById('connection-status').innerText = "Status: Live & Connected";
                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    // Real-time tick updates (data.k.c is current price)
                    this.onTick(parseFloat(data.k.c));
                };
                ws.onclose = () => {
                    document.getElementById('connection-status').innerText = "Status: Disconnected. Reconnecting...";
                    setTimeout(() => this.connect(), 2000);
                };
            }
        }

        // --- WIRING ---
        const liveDataDiv = document.getElementById('live-data');
        const outputDiv = document.getElementById('output');
        const myBuffer = new CandleBuffer(300);
        
        const myAlerts = new AlertEngine({
            onAlert: (alert) => {
                const color = alert.type === 'CALL' ? '#00ff00' : '#ff0000';
                const timestamp = new Date().toLocaleTimeString();
                const alertHTML = `<div class="alert-box" style="border-color:${color}; color:${color}">
                    [${timestamp}] SIGNAL: ${alert.type} | Price: $${alert.price} | Score: ${alert.score}
                </div>`;
                outputDiv.insertAdjacentHTML('afterbegin', alertHTML);
            }
        });

        const myFeed = new BinanceFeed('btcusdt', (currentPrice) => {
            myBuffer.push(currentPrice);
            const score = computeScore(myBuffer.get());
            
            // Update Top Display
            liveDataDiv.innerHTML = `
                <p class="price-display">BTC: $${currentPrice.toFixed(2)}</p>
                <p class="score-display" style="color: ${score > 50 ? '#0f0' : '#f00'}">
                    Strategy Score: ${score}
                </p>
            `;
            
            myAlerts.evaluate(score, currentPrice);
        });

        myFeed.connect();
    </script>
</body>
</html>
